<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8" />
    <title>Yvio Player</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        html, body {
        height: 100%;
        overscroll-behavior: none;   /* verhindert Pull-to-Refresh */
        touch-action: none;          /* verhindert Browser-Gesten */
        }

        canvas {
            background: #eee;
            display: block;
            margin: 0 auto;
            touch-action: none;          /* extra Sicherheit fürs Canvas */
        }
    </style>
    <script src="constants.js"></script>
    <script src="quiz_de.js"></script>
    <script src="files_de.js"></script>
    <script src="display.js"></script>
    <script src="ascii.js"></script>
</head>
  <body>
    <audio id="audioPlayer"></audio>
    <canvas id="myCanvas" width="800" height="800">
    </canvas>
    <script src="game.js"></script>

  <!-- Save / Load Popup -->
    <div id="savePopup" style="
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.7);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:1000;
    ">
    <div style="background:white;padding:20px;border-radius:10px;width:300px;text-align:center;">
        <h2>Spielstand</h2>
        <div id="saveSlots"></div>
        <br>
        <button onclick="closeSavePopup()">Schließen</button>
    </div>
</div>
  </body>
</html>
